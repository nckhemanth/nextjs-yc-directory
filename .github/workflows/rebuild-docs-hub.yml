name: Rebuild Docs Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  dispatch:
    name: Trigger workspace deploy
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs hub rebuild
        env:
          GH_TOKEN: ${{ secrets.DOCS_HUB_DISPATCH_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nckhemanth/workspace/dispatches \
            -d "{\"event_type\":\"content-updated\",\"client_payload\":{\"repository\":\"$REPOSITORY\",\"ref\":\"$REF_NAME\",\"sha\":\"$SHA\"}}"
